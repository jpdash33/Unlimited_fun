<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Fun - Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="joke-container">
        <div class="emoji-header">
            <span>😂</span><span>🤣</span><span>😜</span>
        </div>
        
        <h1>Joke of the Moment</h1>
        
        <div class="joke-box">
            <p id="joke-text">Click the button below to crack a smile! 👇</p>
            <div id="loader" class="loader hidden"></div>
        </div>

        <div class="action-buttons">
            <button id="joke-btn" class="btn primary-btn">
                <i class="fas fa-laugh-beam"></i> Get Joke
            </button>
        </div>
    </div>

    <script src="function.js"></script>
</body>
</html>
